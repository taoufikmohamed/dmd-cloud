apiVersion: v1
kind: Namespace
metadata:
  name: dmd-production
  labels:
    name: dmd-production
    environment: production
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: dmd-quota
  namespace: dmd-production
spec:
  hard:
    requests.cpu: "10"
    requests.memory: 20Gi
    limits.cpu: "20"
    limits.memory: 40Gi
    persistentvolumeclaims: "10"
    services.loadbalancers: "2"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: dmd-limits
  namespace: dmd-production
spec:
  limits:
  - max:
      cpu: "2"
      memory: 2Gi
    min:
      cpu: 100m
      memory: 64Mi
    default:
      cpu: 500m
      memory: 512Mi
    defaultRequest:
      cpu: 250m
      memory: 256Mi
    type: Container
