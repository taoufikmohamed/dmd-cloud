apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook-service
  namespace: dmd-production
  labels:
    app: webhook-service
    environment: production
spec:
  replicas: 3  # Production: 3 replicas for HA
  selector:
    matchLabels:
      app: webhook-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: webhook-service
        environment: production
    spec:
      containers:
      - name: webhook-service
        image: dmdacrprod.azurecr.io/webhook-service:latest  # Update with your ACR
        imagePullPolicy: Always  # Always pull latest in production
        ports:
        - containerPort: 8001
          name: http
        env:
        - name: AI_SERVICE_URL
          value: "http://ai-service:8000"
        - name: AI_SERVICE_TIMEOUT_SECONDS
          value: "25"
        - name: WEBHOOK_RESPONSE_TIMEOUT
          value: "5"
        - name: ENVIRONMENT
          value: "production"
        - name: LOG_LEVEL
          value: "INFO"
        resources:
          requests:
            memory: "128Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 2
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 15"]
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
              - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: webhook-service
  namespace: dmd-production
  annotations:
    service.beta.kubernetes.io/azure-load-balancer-health-probe-request-path: /health
spec:
  selector:
    app: webhook-service
  ports:
  - port: 8001
    targetPort: 8001
    protocol: TCP
    name: http
  type: LoadBalancer  # Production: use LoadBalancer
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: webhook-service-hpa
  namespace: dmd-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: webhook-service
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Pods
        value: 1
        periodSeconds: 60
