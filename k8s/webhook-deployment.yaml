
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook-service
spec:
  replicas: 2  # Run 2 instances for redundancy
  selector:
    matchLabels:
      app: webhook-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: webhook-service
    spec:
      containers:
      - name: webhook-service
        image: webhook-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8001
        env:
        - name: AI_SERVICE_URL
          value: "http://ai-service:8000"
        - name: AI_SERVICE_TIMEOUT_SECONDS
          value: "25"  # Must be less than GitHub's 30s timeout
        - name: WEBHOOK_RESPONSE_TIMEOUT
          value: "5"   # Return to GitHub within 5 seconds
        resources:
          requests:
            memory: "64Mi"
            cpu: "250m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        # Liveness probe - check if service is alive
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        # Readiness probe - check if service can handle traffic
        readinessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 2
        # Graceful shutdown
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 15"]
---
apiVersion: v1
kind: Service
metadata:
  name: webhook-service
spec:
  selector:
    app: webhook-service
  ports:
  - port: 8001
    targetPort: 8001
    protocol: TCP
  type: NodePort
  sessionAffinity: None
