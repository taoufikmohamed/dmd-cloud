name: "CodeQL"
on:
  push:
    branches: [ taoufikmohamed-patch-11 ]
  pull_request:
    branches: [ taoufikmohamed-patch-11 ]
jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript # or your project's language
      - uses: github/codeql-action/analyze@v3
