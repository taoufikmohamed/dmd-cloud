name: CD

on:
  push:
    branches: [ master ]

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Restore kubeconfig
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG_DATA }}
        run: |
          echo "$KUBECONFIG_DATA" | base64 --decode > kubeconfig
          export KUBECONFIG=$PWD/kubeconfig

      - name: Apply manifests and update images
        run: |
          kubectl apply -f k8s/
          kubectl set image -f k8s/ai-deployment.yaml --local -o yaml \
            ai-container=${{ secrets.REGISTRY_DOMAIN }}/ai_service:${{ github.sha }} | kubectl apply -f -
          kubectl set image -f k8s/webhook-deployment.yaml --local -o yaml \
            webhook-container=${{ secrets.REGISTRY_DOMAIN }}/webhook_service:${{ github.sha }} | kubectl apply -f -
