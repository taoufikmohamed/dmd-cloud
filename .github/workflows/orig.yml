name: DMD Cloud CI/CD Pipeline

on:
  push:
    branches:
      - master
      - develop
  pull_request:
    branches:
      - master
      - develop
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  actions: read
  pull-requests: write
  security-events: write

env:
  REGISTRY: ghcr.io
  IMAGE_REGISTRY: docker.io

jobs:
  # =========================================================================
  # CODE QUALITY & SECURITY CHECKS
  # =========================================================================
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort pytest coverage

      - name: Run Linting (flake8)
        continue-on-error: true
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Check code formatting (black)
        continue-on-error: true
        run: |
          black --check . 2>&1 || echo "Code formatting issues found (non-blocking)"

      - name: Check import sorting (isort)
        continue-on-error: true
        run: |
          isort --check-only . 2>&1 || echo "Import sorting issues found (non-blocking)"

  # =========================================================================
  # BUILD DOCKER IMAGES
  # =========================================================================
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: code-quality
    strategy:
      matrix:
        service:
          - ai_service
          - webhook_service
          - orchestrator
    outputs:
      ai-service-image: ${{ steps.build-ai.outputs.image }}
      webhook-service-image: ${{ steps.build-webhook.outputs.image }}
      orchestrator-image: ${{ steps.build-orchestrator.outputs.image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for ${{ matrix.service }}
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push AI Service image
        if: matrix.service == 'ai_service'
        id: build-ai
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build and push Webhook Service image
        if: matrix.service == 'webhook_service'
        id: build-webhook
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build and push Orchestrator image
        if: matrix.service == 'orchestrator'
        id: build-orchestrator
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # =========================================================================
  # KUBERNETES DEPLOYMENT VALIDATION
  # =========================================================================

  validate-kubernetes:
    name: Validate Kubernetes Manifests
    runs-on: ubuntu-latest
    needs: build-images
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Kubeconform
        run: |
          curl -L https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | tar xz
          sudo mv kubeconform /usr/local/bin/

      - name: Validate Kubernetes manifests
        run: |
          kubeconform -summary -ignore-missing-schemas -kubernetes-version 1.35.1 k8s/webhook-deployment.yaml
          kubeconform -summary -ignore-missing-schemas -kubernetes-version 1.35.1 k8s/ai-deployment.yaml
          kubeconform -summary -ignore-missing-schemas -kubernetes-version 1.35.1 k8s/production/
          
          # Validate all files in production directory
          kubeconform -summary -ignore-missing-schemas -kubernetes-version 1.35.1 k8s/production/
       #       uses: actions/checkout@v4

  #     - name: Install kubeval
  #       run: |
  #         wget https://github.com/instrumenta/kubeval/releases/latest/download/kubeval-linux-amd64.tar.gz
  #         tar xf kubeval-linux-amd64.tar.gz
