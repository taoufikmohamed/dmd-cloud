  #         kubeval k8s/production/ingress.yaml


  # =========================================================================
  # UNIT TESTS
  # =========================================================================
  unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    needs: code-quality
    strategy:
      matrix:
        service:
          - ai_service
          - webhook_service
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Ensure webhook-service exists
        run: |
          if [ ! -d "./webhook_service" ]; then
            echo "webhook_service directory missing!"
            exit 1
          fi

      - name: Install dependencies for ${{ matrix.service }}
        working-directory: ./${{ matrix.service }}
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-cov

      - name: Run tests for ${{ matrix.service }}
        working-directory: ./${{ matrix.service }}
        run: |
          pytest --cov --cov-report=xml || echo "No tests found"

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        if: matrix.service == 'ai-service'
        with:
          flags: unittests
          name: codecov-umbrella

  # =========================================================================
  # INTEGRATION TESTS (Optional - requires minikube or k8s cluster)
  # =========================================================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [build-images, validate-kubernetes]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    services:
      docker:
        image: docker:dind
        options: --privileged
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Minikube
        uses: medyagh/setup-minikube@latest
        with:
          kubernetes-version: 1.35.1  # Change from v1.27.0 to 1.35.1 or another supported version
          driver: docker
          memory: 4096
          cpus: 2

      - name: Build and load images to Minikube
        run: |
          eval $(minikube docker-env)
          docker build -t ai-service:latest ./ai_service
          docker build -t webhook-service:latest ./webhook_service
          docker build -t orchestrator:latest ./orchestrator

      - name: Create Kubernetes secret
        run: |
          kubectl create secret generic ai-service-secrets \
            --from-literal=DEEPSEEK_API_KEY="${{ secrets.DEEPSEEK_API_KEY }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy services to Minikube
        run: |
          kubectl apply -f k8s/ai-deployment.yaml
          kubectl apply -f k8s/webhook-deployment.yaml
          kubectl rollout status deployment/ai-service --timeout=120s
          kubectl rollout status deployment/webhook-service --timeout=120s

      - name: Run integration test
        run: |
          # Port forward services
          nohup kubectl port-forward service/webhook-service 8001:8001 > /dev/null 2>&1 &
          sleep 5
          
          # Test webhook endpoint
          PAYLOAD=$(cat <<'EOF'
          {
            "repository": {"full_name": "test/repo"},
            "head_commit": {"id": "abc123", "message": "test commit"},
            "diff": "diff --git a/test.py b/test.py\n+print('Hello')"
          }
          EOF
          )
          
          RESPONSE=$(curl -w "%{http_code}" -X POST http://localhost:8001/webhook/github \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          
          if [[ ! $RESPONSE == *"200"* ]]; then
            echo "Webhook test failed: $RESPONSE"
            exit 1
          fi
          
          echo "Webhook test passed!"

  # =========================================================================
  # SECURITY SCANNING
  # =========================================================================
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # =========================================================================
  # GENERATE CI/CD DOCUMENTATION
  # =========================================================================
  generate-docs:
    name: Generate and Update Documentation
    runs-on: ubuntu-latest
    needs: [unit-tests, validate-kubernetes]
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Wait for CodeQL
        uses: actions/github-script@v7
        with:
          script: |
            const token = core.getInput('github-token');
            const octokit = github.getOctokit(token);

            // Get combined status for the current commit
            const { data } = await octokit.repos.getCombinedStatusForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha
            });
      
            // Check that CodeQL checks passed
            if (!data.statuses.some(s => s.context.includes('CodeQL') && s.state === 'success')) {
              throw new Error('CodeQL checks not passed yet.');
            }
      - name: Generate workflow documentation
        run: |
          cat > WORKFLOW.md << 'EOF'
          # CI/CD Workflow Documentation
          
          ## Pipeline Overview
          This workflow automates the entire DMD Cloud deployment process.
          
          ### Stages
          1. **Code Quality** - Linting, formatting checks
          2. **Build** - Docker image compilation
          3. **Validation** - Kubernetes manifest validation
          4. **Testing** - Unit and integration tests
          5. **Security** - Vulnerability scanning
          6. **Documentation** - Auto-generated docs
          
          ## Execution Flow
          - Triggered on: push to master/develop, PRs
          - Services deployed: AI Service, Webhook Service, Orchestrator
          - Expected duration: ~15-20 minutes
          
          Generated: $(date)
          EOF

      - name: Commit documentation
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: 'docs: auto-generated workflow documentation'
          file_pattern: 'WORKFLOW.md'
          skip_fetch: false
          skip_checkout: false

  # =========================================================================
  # FINAL STATUS & NOTIFICATIONS
  # =========================================================================
  workflow-status:
    name: Workflow Summary
    runs-on: ubuntu-latest
    needs: [code-quality, build-images, validate-kubernetes, unit-tests, security-scan]
    if: always()
    steps:
      - name: Check workflow status
        run: |
          echo "✓ Code Quality Checks: ${{ needs.code-quality.result }}"
          echo "✓ Build Docker Images: ${{ needs.build-images.result }}"
          echo "✓ Kubernetes Validation: ${{ needs.validate-kubernetes.result }}"
          echo "✓ Unit Tests: ${{ needs.unit-tests.result }}"
          echo "✓ Security Scan: ${{ needs.security-scan.result }}"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Workflow failed! Check logs for details."
          exit 1

      - name: Notify on success
        if: success()
        run: |
          echo "::notice::All workflow stages completed successfully!"
